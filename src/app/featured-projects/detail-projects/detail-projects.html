<div class="card_bg" (click)="closeDetail()">
  <div class="card_container" (click)="$event.stopPropagation()">
    <div class="card_close_button" (click)="closeDetail()"></div>
    <div class="card_content" id="cardContent">
      <div class="card_left">
        <div class="card_name">
          <h1>0{{ projects[projectId].id }}</h1>
          <h2>{{ projects[projectId].name }}</h2>
        </div>
        <div>
          <h4>What is this project about?</h4>
          <p>
            {{ projects[projectId].description }}
          </p>
          <div class="card_skills">
            <span *ngFor="let skill of projects[projectId].skills"
              ><img src="/assets/img/detailprojects/{{ skill }}.svg" alt="{{ skill }}" />
              {{ skill }}</span
            >
          </div>
        </div>
        <div class="card_links">
          <a href="https://github.com/MikeGrupp/Join403">
            <button>
              Github <img src="/assets/img/detailprojects/arrow_outward.svg" alt="Github" />
            </button>
          </a>
          <a href="">
            <button>
              Live Test
              <img src="/assets/img/detailprojects/arrow_outward.svg" alt="Live Test" />
            </button>
          </a>
        </div>
      </div>
      <div class="card_right">
        <img src="/assets/img/projects/Rectangle 30.png" alt="Project Image" />
      </div>
    </div>

    <div class="card_next_project" (click)="NextProject()">
      <p>Next Project</p>
      <img src="/assets/img/detailprojects/arrow_outward.svg" alt="Next Project" />
    </div>
  </div>
</div>
