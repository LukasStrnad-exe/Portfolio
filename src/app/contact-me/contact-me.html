<div class="wrapper conact_me">
  <div class="left">
    <h4>Contact me</h4>
    <h2>Let's work together</h2>
    <h4>Got a problem to solve?</h4>
    <p class="font_16">
      Encourage people to contact you and describe what role you are interested in. Show that you
      will add value to their projects through your work.
    </p>
    <p class="font_16">Need a Frontend developer? <span class="color">Let’s talk!</span></p>
  </div>
  <div class="right">
    <form>
      <div class="border">
        <label for="name"><h4>What's your name?</h4></label>
        <input type="text" id="name" name="name" placeholder="Your name goes here" required />
      </div>
      <div>
        <label for="email"><h4>What's your email?</h4></label>
        <input type="email" id="email" name="email" placeholder="youremail@email.com" required />
      </div>
      <div class="border">
        <label for="subject"><h4>How can I help you?</h4></label>
        <input
          type="text"
          id="subject"
          name="subject"
          placeholder="Hello Lukas, I am interested in..."
          required
        />
      </div>
      <div class="terms">
        <input type="checkbox" id="terms" name="terms" required />
        <label for="terms">
          I've read the <span class="color"> privacy policy</span> and agree to the processing of my data as outlined.
        </label>
      </div>
      <div class="button_container">
      <button data-text="Say Hello ;)" type="submit">Say Hello ;)</button>
      </div>
    </form>
  </div>
</div>
